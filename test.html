                <style>

                body {
                margin: 0;
                padding: 0;
                }


                /* 전체 테이블 */

                .se-table-content {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
                background-color: #ffffff;
                }


                /* 각각의 상품 영역 */

                .se-cell {
                width: 50%;
                background-color: #ffffff;
                border: 2px solid #ffffff;
                vertical-align: top;
                padding: 0;
                box-sizing: border-box;
                }


                /* 기본 여백 제거 */

                .se-module,
                .se-module-text,
                .se-text-paragraph {
                margin: 0;
                padding: 0;
                }


                /* 이미지 중앙 정렬 */

                .se-text-paragraph-align-center {
                text-align: center;
                }


                /* 이미지 영역 */

                .se-inline-image {
                display: inline-block;
                max-width: 100%;
                }


                /* 실제 이미지 */

                .se-inline-image-resource {
                display: block;
                width: 100%;
                height: auto;
                }


                /* 상품 메인 이미지 */

                .se-cell .se-inline-image[style*="width:750px"] {
                width: 100% !important;
                max-width: 100% !important;
                }


                /* GIF 이미지 */

                .se-cell .se-inline-image[style*="width:288px"],
                .se-cell .se-inline-image[style*="width:287px"],
                .se-cell .se-inline-image[style*="width:286px"],
                .se-cell .se-inline-image[style*="width:285px"],
                .se-cell .se-inline-image[style*="width:284px"] {

                width: 82% !important;
                max-width: 82% !important;

                margin: 28px auto 24px auto;
                }


                /* 링크 */

                .se-cell a {
                display: block;
                text-decoration: none;
                }


                /* 이미지 아래 불필요한 공간 제거 */

                .se-cell img {
                display: block;
                }

                </style>
